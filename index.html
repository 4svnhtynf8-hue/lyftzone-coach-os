<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyft Zone · Coach OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --warm-black: #1D1D1B;
    --antique-white: #F5F0E8;
    --cocoa: #3D271A;
    --charcoal: #4C4C4B;
    --card: #FDFAF5;
    --border: #E8E3DA;
    --border-strong: #C8C3BA;
    --success: #4a7c59;
    --success-bg: #EAF3DE;
    --warning: #B8895A;
    --warning-bg: #FAEEDA;
    --error: #9B3A2F;
    --error-bg: #FCEBEB;
    --text-secondary: #4C4C4B;
    --text-tertiary: #8A8A88;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--antique-white);
    color: var(--warm-black);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    background: var(--warm-black);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .header-name { font-size: 15px; font-weight: 600; color: #F5F0E8; letter-spacing: 0.04em; }
  .header-sub  { font-size: 10px; letter-spacing: 0.14em; color: #8a8a88; text-transform: uppercase; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-time  { font-size: 11px; color: #8a8a88; font-family: 'DM Mono', monospace; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--cocoa); color: #F5F0E8; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }

  /* PAGE */
  .page { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }

  /* CONFIG BAR */
  .config-bar {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 24px;
  }
  .config-bar input {
    flex: 1; border: 0.5px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; font-family: 'DM Mono', monospace;
    background: var(--antique-white); color: var(--warm-black); outline: none;
  }
  .config-bar input:focus { border-color: var(--cocoa); }
  .btn-load {
    background: var(--cocoa); color: #F5F0E8; border: none;
    border-radius: 6px; padding: 8px 18px; font-size: 12px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-load:hover { opacity: 0.85; }
  .btn-load:disabled { opacity: 0.4; cursor: not-allowed; }

  /* SECTION LABEL */
  .sec-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-tertiary);
    margin-bottom: 10px; margin-top: 24px;
  }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi-card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 14px; padding: 20px; position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--cocoa); border-radius: 14px 14px 0 0;
  }
  .kpi-label { font-size: 11px; color: var(--text-tertiary); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .kpi-number { font-size: 36px; font-weight: 300; color: var(--cocoa); line-height: 1; letter-spacing: -0.02em; }
  .kpi-number span { font-size: 16px; color: var(--text-tertiary); font-weight: 400; }
  .kpi-sub { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .progress-track { background: var(--border); border-radius: 4px; height: 4px; margin-top: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--cocoa); border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); width: 0; }
  .kpi-pct { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; font-family: 'DM Mono', monospace; }

  /* STAT ROW */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .stat-num   { font-size: 28px; font-weight: 500; color: var(--cocoa); }
  .stat-label { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

  /* BOOKING LIST */
  .booking-list { display: flex; flex-direction: column; gap: 8px; }
  .booking-item {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .booking-time { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--cocoa); min-width: 46px; }
  .booking-divider { width: 0.5px; height: 32px; background: var(--border); flex-shrink: 0; }
  .booking-info { flex: 1; }
  .booking-name { font-size: 15px; font-weight: 500; }
  .booking-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .status-pill { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; }
  .status-completed  { background: var(--success-bg); color: var(--success); }
  .status-upcoming, .status-scheduled { background: var(--warning-bg); color: var(--warning); }
  .status-cancelled, .status-no_show  { background: var(--error-bg);   color: var(--error);   }

  /* WARNING LIST */
  .warning-list { display: flex; flex-direction: column; gap: 8px; }
  .warning-item {
    background: var(--warning-bg); border: 0.5px solid #F0C98A;
    border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .warning-icon { font-size: 16px; flex-shrink: 0; }
  .warning-text { font-size: 13px; color: #5a3a0a; line-height: 1.4; flex: 1; }
  .warning-badge { font-size: 18px; font-weight: 600; color: var(--warning); font-family: 'DM Mono', monospace; }

  /* EMPTY / LOADING / ERROR */
  .empty {
    text-align: center; padding: 28px; color: var(--text-tertiary);
    font-size: 13px; background: var(--card);
    border: 0.5px dashed var(--border); border-radius: 12px;
  }
  .loading { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--cocoa); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-tertiary); }
  .error-box { background: var(--error-bg); border: 0.5px solid #F7C1C1; border-radius: 10px; padding: 16px 20px; font-size: 13px; color: var(--error); line-height: 1.6; }

  /* GENERATED AT */
  .generated-at { font-size: 11px; color: var(--text-tertiary); font-family: 'DM Mono', monospace; text-align: right; margin-bottom: 16px; }

  /* FOOTER */
  .footer { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 36px; font-family: 'DM Mono', monospace; }

  /* FADE */
  .fade-in { animation: fadeIn 0.35s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-name">Lyft Zone</div>
    <div class="header-sub">Coach OS</div>
  </div>
  <div class="header-right">
    <div class="header-time" id="clock">--:--</div>
    <div class="avatar">ĐT</div>
  </div>
</div>

<div class="page">
  <div class="config-bar">
    <input type="text" id="apiUrl" placeholder="Dán Web App URL vào đây...  https://script.google.com/macros/s/.../exec" />
    <button class="btn-load" id="btnLoad" onclick="loadDashboard()">Tải Dashboard</button>
  </div>
  <div id="content">
    <div class="empty">Nhập Web App URL và bấm "Tải Dashboard" để xem dữ liệu thật từ Google Sheet.</div>
  </div>
</div>

<script>
// CLOCK
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 10000);

// JSONP loader
function loadDashboard() {
  var url = document.getElementById('apiUrl').value.trim();
  if (!url) { alert('Vui lòng nhập Web App URL'); return; }

  // lưu URL
  try { localStorage.setItem('lz_api_url', url); } catch(e) {}

  var btn = document.getElementById('btnLoad');
  btn.disabled = true;
  btn.textContent = 'Đang tải...';

  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><div class="loading-text">Đang tải từ Google Sheet...</div></div>';

  // Xoá callback cũ nếu có
  if (window.__lzCb) {
    var old = document.getElementById('__lzScript');
    if (old) old.remove();
  }

  var cbName = '__lzDashboard_' + Date.now();
  window[cbName] = function(json) {
    btn.disabled = false;
    btn.textContent = 'Tải lại';
    var s = document.getElementById('__lzScript');
    if (s) s.remove();
    if (json && json.success) {
      renderDashboard(json.data);
    } else {
      document.getElementById('content').innerHTML =
        '<div class="error-box"><strong>API lỗi</strong><br>' + (json && json.error ? json.error : 'Không rõ lỗi') + '</div>';
    }
  };

  var script = document.createElement('script');
  script.id = '__lzScript';
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  script.src = url + sep + 'action=getDashboardJsonp&callback=' + cbName;
  script.onerror = function() {
    btn.disabled = false;
    btn.textContent = 'Tải lại';
    document.getElementById('content').innerHTML =
      '<div class="error-box"><strong>Không tải được</strong><br>Kiểm tra URL và cài đặt deploy (Who has access: Anyone).</div>';
  };
  document.head.appendChild(script);
}

function fmt(n) {
  return Number(n || 0).toLocaleString('vi-VN');
}

function renderDashboard(d) {
  var show     = d.showKPI        || d.kpi_show    || {};
  var rev      = d.revenueKPI     || d.kpi_revenue || {};
  var students = d.studentsSummary || {};
  var bookings = d.todayBookings  || d.today_bookings || [];
  var warnings = d.warnings       || [];
  var genAt    = d.generated_at   || '';

  var showCompleted = show.completed_shows ?? show.completed ?? 0;
  var showTarget    = show.target_shows    ?? show.target    ?? 0;
  var showPct       = show.percentage ?? show.percent ?? (showTarget > 0 ? Math.round(showCompleted/showTarget*100) : 0);

  var revCurrent = rev.current_revenue ?? rev.current ?? 0;
  var revTarget  = rev.target_revenue  ?? rev.target  ?? 0;
  var revPct     = rev.percentage ?? rev.percent ?? (revTarget > 0 ? Math.round(revCurrent/revTarget*100) : 0);

  var totalActive = d.total_active_students ?? students.active_non_trial ?? '-';
  var pt11  = students.pt_1_1 ?? '-';
  var semi  = students.semi   ?? '-';

  var today = new Date().toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'numeric'});

  var bookingHtml = bookings.length === 0
    ? '<div class="empty">Không có lịch hôm nay 🎉</div>'
    : '<div class="booking-list">' + bookings.map(function(b) {
        var st = (b.status || 'upcoming').toLowerCase().replace(' ','_');
        return '<div class="booking-item">'
          + '<div class="booking-time">' + (b.time || b.start_time || '--') + '</div>'
          + '<div class="booking-divider"></div>'
          + '<div class="booking-info">'
          +   '<div class="booking-name">' + (b.student_name || b.name || '?') + '</div>'
          +   '<div class="booking-meta">' + (b.session_type || b.type || 'PT') + ' · ' + (b.duration_minutes || b.duration_min || 60) + ' phút</div>'
          + '</div>'
          + '<div class="status-pill status-' + st + '">' + b.status + '</div>'
          + '</div>';
      }).join('') + '</div>';

  var warningHtml = warnings.length === 0 ? '' :
    '<div class="sec-label">Cảnh báo</div>'
    + '<div class="warning-list">' + warnings.map(function(w) {
        return '<div class="warning-item">'
          + '<div class="warning-icon">⚠️</div>'
          + '<div class="warning-text"><strong>' + (w.student_name || '') + '</strong><br>' + (w.message || w.type || '') + '</div>'
          + (w.remaining_sessions !== undefined ? '<div class="warning-badge">' + w.remaining_sessions + '</div>' : '')
          + '</div>';
      }).join('') + '</div>';

  document.getElementById('content').innerHTML = '<div class="fade-in">'
    + (genAt ? '<div class="generated-at">Cập nhật ' + genAt + '</div>' : '')

    + '<div class="sec-label">KPI tháng & doanh thu</div>'
    + '<div class="kpi-grid">'

    + '<div class="kpi-card">'
    + '<div class="kpi-label">Buổi tập · ' + (show.month || '') + '</div>'
    + '<div class="kpi-number">' + showCompleted + '<span> / ' + showTarget + '</span></div>'
    + '<div class="kpi-sub">mục tiêu tháng này</div>'
    + '<div class="progress-track"><div class="progress-fill" id="pf1"></div></div>'
    + '<div class="kpi-pct">' + showPct + '% hoàn thành</div>'
    + '</div>'

    + '<div class="kpi-card">'
    + '<div class="kpi-label">Doanh thu · ' + (rev.quarter || '') + '</div>'
    + '<div class="kpi-number">' + fmt(revCurrent) + '<span>đ</span></div>'
    + '<div class="kpi-sub">target ' + fmt(revTarget) + 'đ</div>'
    + '<div class="progress-track"><div class="progress-fill" id="pf2"></div></div>'
    + '<div class="kpi-pct">' + revPct + '% hoàn thành</div>'
    + '</div>'

    + '</div>'

    + '<div class="sec-label">Học viên</div>'
    + '<div class="stat-row">'
    + '<div class="stat-card"><div class="stat-num">' + totalActive + '</div><div class="stat-label">Active</div></div>'
    + '<div class="stat-card"><div class="stat-num">' + pt11 + '</div><div class="stat-label">PT 1:1</div></div>'
    + '<div class="stat-card"><div class="stat-num">' + semi + '</div><div class="stat-label">Semi-Coach</div></div>'
    + '</div>'

    + '<div class="sec-label">Lịch hôm nay · ' + today + '</div>'
    + bookingHtml

    + warningHtml

    + '<div class="footer">Lyft Zone Coach OS · v1.0 · Google Sheet</div>'
    + '</div>';

  // Animate progress bars sau khi DOM render
  setTimeout(function() {
    var pf1 = document.getElementById('pf1');
    var pf2 = document.getElementById('pf2');
    if (pf1) pf1.style.width = Math.min(showPct, 100) + '%';
    if (pf2) pf2.style.width = Math.min(revPct, 100) + '%';
  }, 50);
}

// Auto-load URL đã lưu
window.addEventListener('load', function() {
  try {
    var saved = localStorage.getItem('lz_api_url');
    if (saved) document.getElementById('apiUrl').value = saved;
  } catch(e) {}
});
</script>
</body>
</html>
